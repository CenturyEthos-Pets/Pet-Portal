// ── Vaccination helpers ──────────────────────────────────
function vaccStatus(pet){
  if(!pet.vaccineDate)return "unknown";
  const diff=Math.ceil((new Date(pet.vaccineDate)-new Date())/86400000);
  if(diff<0)return "overdue";
  if(diff<=30)return "due-soon";
  return "ok";
}
function vaccColor(s){return s==="ok"?"#059669":s==="due-soon"?"#d97706":"#dc2626";}
function vaccBg(s){return s==="ok"?"#d1fae5":s==="due-soon"?"#fef3c7":"#fee2e2";}
function vaccLabel(s){return s==="ok"?"✓ Vaccinated":s==="due-soon"?"⚠ Due Soon":"⚠ Overdue";}

// Change 1: Convert days to months for display
function vaccTimeLabel(daysLeft){
  if(daysLeft===null)return null;
  const abs=Math.abs(daysLeft);
  if(abs<30){
    return daysLeft>=0?`${abs}d left`:`${abs}d ago`;
  }
  const months=Math.round(abs/30.44);
  return daysLeft>=0?`~${months} mo left`:`~${months} mo ago`;
}

// ── Birthday helpers ─────────────────────────────────────
function isBirthdayToday(dob){
  if(!dob)return false;
  const today=new Date();
  const d=new Date(dob);
  return d.getMonth()===today.getMonth()&&d.getDate()===today.getDate();
}
function petAge(dob){
  if(!dob)return null;
  const diff=new Date()-new Date(dob);
  const years=Math.floor(diff/(365.25*86400000));
  return years;
}

// ── Image compress ───────────────────────────────────────
function compressImg(file,maxW=400,q=0.72){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement("canvas");
        const ratio=Math.min(maxW/img.width,maxW/img.height,1);
        c.width=img.width*ratio;c.height=img.height*ratio;
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL("image/jpeg",q));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

            {!secretaryUnlocked&&<div style={{marginTop:16,background:"#eff6ff",borderRadius:10,padding:"10px 13px",fontSize:12,color:"#1d4ed8",fontWeight:600}}>🔐 Pet Group RR: tap the Pet Group RR button above to post or delete notices.</div>}
          </div>
        )}
      </div>{/* end content */}

      {/* ═══════════ MODALS ═══════════ */}

      {/* DELETE PET */}
      {showDeleteConfirm&&(
        <div className="overlay" onClick={()=>setShowDeleteConfirm(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:360,textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:8}}>🗑️</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:800,marginBottom:8}}>Remove Pet Record?</div>
            <div style={{fontSize:13,color:"#64748b",marginBottom:20,lineHeight:1.6}}>This will permanently delete this pet's registration. Only do this if the pet is shifting out of the society.</div>
            <div style={{display:"flex",gap:10}}>
              <button className="btn" onClick={()=>setShowDeleteConfirm(null)} style={{flex:1,padding:"12px",borderRadius:12,background:"#f1f5f9",color:"#64748b",fontWeight:800}}>Cancel</button>
              <button className="btn" onClick={()=>deletePet(showDeleteConfirm)} style={{flex:1,padding:"12px",borderRadius:12,background:"#dc2626",color:"white",fontWeight:800}}>Yes, Delete</button>
            </div>
          </div>
        </div>
      )}

      {/* Pet Group RR LOGIN */}
      {showNoticeLogin&&(
        <div className="overlay" onClick={()=>setShowNoticeLogin(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:360,textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:8}}>🔐</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:800,marginBottom:4}}>Secretary Login</div>
            <div style={{fontSize:13,color:"#64748b",marginBottom:18,lineHeight:1.6}}>Enter the Pet Group RR PIN to post notices, manage reports, and view reporter details.</div>
            <input type="password" value={secPin} onChange={e=>setSecPin(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSecretaryUnlock()} placeholder="••••" maxLength={8}
              style={{...iS,textAlign:"center",fontSize:22,letterSpacing:8,marginBottom:8,border:"2px solid #c7d2fe"}}/>
            {secPinErr&&<div style={{color:"#dc2626",fontSize:12,fontWeight:700,marginBottom:8}}>Incorrect Pet Group RR PIN.</div>}
            <div style={{display:"flex",gap:10,marginTop:4}}>
              <button className="btn" onClick={()=>setShowNoticeLogin(false)} style={{flex:1,padding:"12px",borderRadius:12,background:"#f1f5f9",color:"#64748b",fontWeight:800}}>Cancel</button>
              <button className="btn" onClick={handleSecretaryUnlock} style={{flex:2,padding:"12px",borderRadius:12,background:"linear-gradient(135deg,#1e3a5f,#2563eb)",color:"white",fontWeight:800}}>Unlock</button>
            </div>
          </div>
        </div>
      )}

      {/* REGISTER PET */}
      {showAddPet&&(
        <div className="overlay" onClick={()=>setShowAddPet(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:800,color:"#1e293b"}}>Register a Pet 🐾</div>
              <button className="btn" onClick={()=>setShowAddPet(false)} style={{background:"#f1f5f9",borderRadius:"50%",width:28,height:28,fontSize:13,color:"#64748b"}}>✕</button>
            </div>
            <div style={{fontSize:11,color:"#94a3b8",marginBottom:4}}>Fields marked <span style={{color:"#dc2626",fontWeight:800}}>*</span> are required</div>
            <SecHdr icon="📷" title="Pet Photo (Optional)"/>
            <div className="fw">
              <input type="file" accept="image/*" ref={fileRef} onChange={handlePetPhoto} style={{display:"none"}}/>
              {photoPreview?(
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <img src={photoPreview} alt="preview" style={{width:72,height:72,borderRadius:14,objectFit:"cover",border:"3px solid #c7d2fe"}}/>
                  <div>
                    <div style={{fontWeight:800,fontSize:12,color:"#059669",marginBottom:5}}>Photo selected!</div>
                    <button className="btn" onClick={()=>fileRef.current.click()} style={{background:"#eef2ff",color:"#4338ca",padding:"5px 12px",borderRadius:8,fontSize:11,fontWeight:800,marginRight:6}}>Change</button>
                    <button className="btn" onClick={()=>{setPhotoPreview(null);sf("photo","");}} style={{background:"#fee2e2",color:"#dc2626",padding:"5px 12px",borderRadius:8,fontSize:11,fontWeight:800}}>Remove</button>
                  </div>
                </div>
              ):(
                <div className="photo-box" onClick={()=>fileRef.current.click()}>
                  <div style={{fontSize:28,marginBottom:6}}>🐾</div>
                  <div style={{fontWeight:800,color:"#64748b",fontSize:13,marginBottom:3}}>Tap to upload pet photo</div>
                  <div style={{fontSize:11,color:"#94a3b8"}}>JPG or PNG, up to 10MB</div>
                </div>
              )}
            </div>
            <SecHdr icon="🐾" title="Pet Details"/>
            <div className="fw"><label className="fl">Pet Name <span style={{color:"#dc2626"}}>*</span></label><input value={newPet.name} onChange={e=>sf("name",e.target.value)} placeholder="e.g. Bruno" style={iS}/></div>
            <div className="fw"><label className="fl">Pet Type <span style={{color:"#dc2626"}}>*</span></label>
              <select value={newPet.type} onChange={e=>sf("type",e.target.value)} style={iS}>
                {["Dog","Cat","Bird","Fish","Rabbit","Other"].map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div className="fw"><label className="fl">Breed Details</label><input value={newPet.breed} onChange={e=>sf("breed",e.target.value)} placeholder="e.g. Golden Retriever, Persian, Mixed Breed" style={iS}/></div>
            <div className="fw"><label className="fl">Date of Birth</label><input type="date" value={newPet.dob} onChange={e=>sf("dob",e.target.value)} style={iS}/></div>
            <div className="fw">
              <label className="fl">Temperament / Behaviour</label>
              <select value={newPet.temperament} onChange={e=>sf("temperament",e.target.value)} style={iS}>
                {TEMPERAMENTS.map(t=><option key={t}>{t}</option>)}
              </select>
              <div style={{fontSize:11,color:"#94a3b8",marginTop:3}}>Helps other residents know how to interact with your pet</div>
            </div>
            <SecHdr icon="🏠" title="Residence Details"/>
            <div className="two-col">
              <div className="fw"><label className="fl">Block No. <span style={{color:"#dc2626"}}>*</span></label><input value={newPet.block} onChange={e=>sf("block",e.target.value)} placeholder="e.g. A" style={iS}/></div>
              <div className="fw"><label className="fl">Flat No. <span style={{color:"#dc2626"}}>*</span></label><input value={newPet.flat} onChange={e=>sf("flat",e.target.value)} placeholder="e.g. 201" style={iS}/></div>
            </div>
            <div className="fw"><label className="fl">E-Mail Address</label><input type="email" value={newPet.email} onChange={e=>sf("email",e.target.value)} placeholder="e.g. yourname@gmail.com" style={iS}/></div>
            <SecHdr icon="👤" title="Primary Parent #1"/>
            <div className="fw"><label className="fl">Name <span style={{color:"#dc2626"}}>*</span></label><input value={newPet.parent1Name} onChange={e=>sf("parent1Name",e.target.value)} placeholder="e.g. Rajesh Sharma" style={iS}/></div>
            <div className="fw"><label className="fl">Phone No. <span style={{color:"#dc2626"}}>*</span></label><input type="tel" value={newPet.parent1Phone} onChange={e=>sf("parent1Phone",e.target.value)} placeholder="e.g. 9876543210" style={iS}/></div>
            <SecHdr icon="👤" title="Primary Parent #2 (Optional)"/>
            <div className="fw"><label className="fl">Name</label><input value={newPet.parent2Name} onChange={e=>sf("parent2Name",e.target.value)} placeholder="e.g. Priya Sharma" style={iS}/></div>
            <div className="fw"><label className="fl">Phone No.</label><input type="tel" value={newPet.parent2Phone} onChange={e=>sf("parent2Phone",e.target.value)} placeholder="e.g. 9876543211" style={iS}/></div>
            <SecHdr icon="🦺" title="Caregiver / Walker / Help (Optional)"/>
            <div className="fw"><label className="fl">Name</label><input value={newPet.caregiverName} onChange={e=>sf("caregiverName",e.target.value)} placeholder="e.g. Ramesh Kumar" style={iS}/></div>
            <div className="fw"><label className="fl">Phone No.</label><input type="tel" value={newPet.caregiverPhone} onChange={e=>sf("caregiverPhone",e.target.value)} placeholder="e.g. 9876543212" style={iS}/></div>
            <SecHdr icon="💉" title="Vaccination Details"/>
            <div style={{background:"#f0fdf4",borderRadius:12,padding:"13px",marginBottom:12,border:"1px solid #86efac"}}>
              <div style={{fontWeight:800,fontSize:13,color:"#065f46",marginBottom:6}}>💉 Next Vaccination Due Date <span style={{color:"#dc2626"}}>*</span></div>
              <div style={{fontSize:12,color:"#374151",marginBottom:10,lineHeight:1.6}}>
                · Already vaccinated? Enter the <strong>next annual booster date</strong>.<br/>
                · Not yet vaccinated? Enter the <strong>planned date</strong> for first vaccination.
              </div>
              <input type="date" value={newPet.vaccineDate} onChange={e=>sf("vaccineDate",e.target.value)} style={iS}/>
              {newPet.vaccineDate&&(()=>{
                const daysLeft=Math.ceil((new Date(newPet.vaccineDate)-new Date())/86400000);
                const col=daysLeft>30?"#059669":daysLeft>=0?"#d97706":"#dc2626";
                const msg=daysLeft>30?`✓ ${vaccTimeLabel(daysLeft)} away — good`:daysLeft>=0?`⚠ Only ${vaccTimeLabel(daysLeft)} left — book soon`:"⚠ This date is in the past — please update";
                return <div style={{marginTop:8,padding:"7px 10px",borderRadius:8,background:daysLeft>30?"#d1fae5":daysLeft>=0?"#fef3c7":"#fee2e2",fontSize:12,fontWeight:700,color:col}}>{msg}</div>;
              })()}
            </div>
            <div style={{display:"flex",gap:10,marginTop:16}}>
              <button className="btn" onClick={()=>setShowAddPet(false)} style={{flex:1,padding:"12px",borderRadius:12,background:"#f1f5f9",color:"#64748b",fontWeight:800}}>Cancel</button>
              <button className="btn" onClick={addPet} disabled={syncing} style={{flex:2,padding:"12px",borderRadius:12,background:"linear-gradient(135deg,#4338ca,#6366f1)",color:"white",fontWeight:800}}>
                {syncing?"Saving...":"🐾 Register Pet"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* LOST & FOUND MODAL */}
      {showAddAlert&&(
        <div className="overlay" onClick={()=>setShowAddAlert(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:800}}>Post Alert 🔍</div>
              <button className="btn" onClick={()=>setShowAddAlert(false)} style={{background:"#f1f5f9",borderRadius:"50%",width:28,height:28,fontSize:13,color:"#64748b"}}>✕</button>
            </div>
            <div className="fw"><label className="fl">Alert Type</label>
              <div style={{display:"flex",gap:8}}>
                {["lost","found"].map(t=>(
                  <button key={t} className="btn" onClick={()=>setNewAlert({...newAlert,type:t})} style={{flex:1,padding:"10px",borderRadius:10,fontWeight:800,fontSize:13,background:newAlert.type===t?(t==="lost"?"#fee2e2":"#d1fae5"):"#f1f5f9",color:newAlert.type===t?(t==="lost"?"#dc2626":"#059669"):"#64748b",border:`2px solid ${newAlert.type===t?(t==="lost"?"#dc2626":"#059669"):"transparent"}`}}>{t==="lost"?"🚨 Lost":"✅ Found"}</button>
                ))}
              </div>
            </div>
            {[{l:"Pet Name *",k:"petName",p:"e.g. Max"},{l:"Pet Type",k:"petType",p:"e.g. Dog"},{l:"Your Block & Flat",k:"flat",p:"e.g. A-205"},{l:"Contact Number *",k:"contact",p:"e.g. 9876501234"}].map(f=>(
              <div key={f.k} className="fw"><label className="fl">{f.l}</label><input value={newAlert[f.k]} onChange={e=>setNewAlert({...newAlert,[f.k]:e.target.value})} placeholder={f.p} style={iS}/></div>
            ))}
            <div className="fw"><label className="fl">Description</label><textarea value={newAlert.description} onChange={e=>setNewAlert({...newAlert,description:e.target.value})} placeholder="Color, collar, distinguishing marks..." style={{...iS,minHeight:72,resize:"vertical"}}/></div>
            <div style={{display:"flex",gap:10}}>
              <button className="btn" onClick={()=>setShowAddAlert(false)} style={{flex:1,padding:"12px",borderRadius:12,background:"#f1f5f9",color:"#64748b",fontWeight:800}}>Cancel</button>
              <button className="btn" onClick={addAlert} style={{flex:2,padding:"12px",borderRadius:12,background:"linear-gradient(135deg,#dc2626,#f97316)",color:"white",fontWeight:800}}>Post Alert</button>
            </div>
          </div>
        </div>
      )}

      {/* REVIEW MODAL */}
      {showAddReview&&(
        <div className="overlay" onClick={()=>setShowAddReview(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:800}}>Write a Review ⭐</div>
              <button className="btn" onClick={()=>setShowAddReview(null)} style={{background:"#f1f5f9",borderRadius:"50%",width:28,height:28,fontSize:13,color:"#64748b"}}>✕</button>
            </div>
            <div className="fw"><label className="fl">Your Rating</label><div style={{marginTop:4}}><StarRating value={newReview.rating} onChange={r=>setNewReview({...newReview,rating:r})}/></div></div>
            <div className="fw"><label className="fl">Your Flat No. *</label><input value={newReview.user} onChange={e=>setNewReview({...newReview,user:e.target.value})} placeholder="e.g. A-201" style={iS}/></div>
            <div className="fw"><label className="fl">Your Review *</label><textarea value={newReview.text} onChange={e=>setNewReview({...newReview,text:e.target.value})} placeholder="Share your experience..." style={{...iS,minHeight:80,resize:"vertical"}}/></div>
            <div style={{display:"flex",gap:10}}>
              <button className="btn" onClick={()=>setShowAddReview(null)} style={{flex:1,padding:"12px",borderRadius:12,background:"#f1f5f9",color:"#64748b",fontWeight:800}}>Cancel</button>
              <button className="btn" onClick={()=>addReview(showAddReview)} style={{flex:2,padding:"12px",borderRadius:12,background:"linear-gradient(135deg,#f59e0b,#d97706)",color:"white",fontWeight:800}}>Submit Review</button>
            </div>
          </div>
        </div>
      )}

      {/* COMBINED REPORT MODAL — Change 4 */}
      {showAddReport&&(
        <div className="overlay" onClick={()=>setShowAddReport(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:800}}>Submit a Report ⚠️</div>
              <button className="btn" onClick={()=>setShowAddReport(false)} style={{background:"#f1f5f9",borderRadius:"50%",width:28,height:28,fontSize:13,color:"#64748b"}}>✕</button>
            </div>
            <div style={{background:"#eff6ff",borderRadius:10,padding:"10px 12px",marginBottom:13,display:"flex",gap:8}}>
              <span style={{fontSize:16,flexShrink:0}}>🔒</span>
              <div style={{fontSize:12,color:"#1d4ed8",fontWeight:600,lineHeight:1.6}}>Your name and contact details are <strong>kept fully confidential</strong> and visible only to the Pet Group RR.</div>
            </div>
            {/* Report type toggle */}
            <div className="fw">
              <label className="fl">Report Type</label>
              <div style={{display:"flex",gap:8}}>
                <button className="btn" onClick={()=>setNewReport(r=>({...r,reportType:"Incident",category:"Hygiene"}))} style={{flex:1,padding:"9px",borderRadius:10,fontWeight:800,fontSize:12,background:newReport.reportType==="Incident"?"#fee2e2":"#f1f5f9",color:newReport.reportType==="Incident"?"#dc2626":"#64748b",border:`2px solid ${newReport.reportType==="Incident"?"#dc2626":"transparent"}`}}>⚠️ Incident</button>
                <button className="btn" onClick={()=>setNewReport(r=>({...r,reportType:"Grievance",category:"Noise"}))} style={{flex:1,padding:"9px",borderRadius:10,fontWeight:800,fontSize:12,background:newReport.reportType==="Grievance"?"#ede9fe":"#f1f5f9",color:newReport.reportType==="Grievance"?"#7c3aed":"#64748b",border:`2px solid ${newReport.reportType==="Grievance"?"#7c3aed":"transparent"}`}}>📋 Grievance</button>
              </div>
            </div>
            <div className="fw"><label className="fl">Category</label>
              <select value={newReport.category} onChange={e=>setNewReport(r=>({...r,category:e.target.value}))} style={iS}>
                {newReport.reportType==="Incident"
                  ?["Hygiene","Safety Concern","Aggressive Pet","Property Damage","Noise","Other"].map(t=><option key={t}>{t}</option>)
                  :["Noise","Leash Violation","Garden Damage","Lift Misuse","General Complaint","Other"].map(t=><option key={t}>{t}</option>)
                }
              </select>
            </div>
            <div className="fw"><label className="fl">Location / Area *</label><input value={newReport.flat} onChange={e=>setNewReport(r=>({...r,flat:e.target.value}))} placeholder="e.g. Near Gate 2, A-Block, Flat A-405" style={iS}/></div>
            <div className="fw"><label className="fl">Description *</label><textarea value={newReport.description} onChange={e=>setNewReport(r=>({...r,description:e.target.value}))} placeholder="Describe the issue clearly..." style={{...iS,minHeight:80,resize:"vertical"}}/></div>
            <SecHdr icon="🔒" title="Your Details (Confidential — Pet Group RR Only)"/>
            <div className="two-col">
              <div className="fw"><label className="fl">Your Name</label><input value={newReport.reporterName} onChange={e=>setNewReport(r=>({...r,reporterName:e.target.value}))} placeholder="e.g. Rajesh Sharma" style={iS}/></div>
              <div className="fw"><label className="fl">Your Phone</label><input type="tel" value={newReport.reporterPhone} onChange={e=>setNewReport(r=>({...r,reporterPhone:e.target.value}))} placeholder="e.g. 9876543210" style={iS}/></div>
            </div>
            {newReport.reportType==="Incident"&&(
              <div className="fw">
                <label className="fl">Photo Evidence (Optional)</label>
                <input type="file" accept="image/*" ref={reportFileRef} onChange={handleReportPhoto} style={{display:"none"}}/>
                {reportPhoto
                  ?<div style={{display:"flex",alignItems:"center",gap:10}}>
                      <img src={reportPhoto} alt="rep" style={{width:62,height:62,borderRadius:10,objectFit:"cover",border:"2px solid #e2e8f0"}}/>
                      <button className="btn" onClick={()=>{setReportPhoto(null);setNewReport(r=>({...r,photo:""}));}} style={{background:"#fee2e2",color:"#dc2626",padding:"5px 10px",borderRadius:8,fontSize:11,fontWeight:800}}>Remove</button>
                    </div>
                  :<div className="photo-box" onClick={()=>reportFileRef.current.click()}>
                      <div style={{fontSize:22,marginBottom:4}}>📷</div>
                      <div style={{fontWeight:700,color:"#64748b",fontSize:12}}>Tap to attach photo</div>
                    </div>
                }
              </div>
            )}
            <div style={{display:"flex",gap:10}}>
              <button className="btn" onClick={()=>setShowAddReport(false)} style={{flex:1,padding:"12px",borderRadius:12,background:"#f1f5f9",color:"#64748b",fontWeight:800}}>Cancel</button>
              <button className="btn" onClick={addReport} style={{flex:2,padding:"12px",borderRadius:12,background:"linear-gradient(135deg,#7c3aed,#6366f1)",color:"white",fontWeight:800}}>Submit Report</button>
            </div>
          </div>
        </div>
      )}

      {/* EXCHANGE MODAL — Change 3 */}
      {showAddExchange&&(
        <div className="overlay" onClick={()=>setShowAddExchange(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:800}}>List an Item for Exchange 🔄</div>
              <button className="btn" onClick={()=>setShowAddExchange(false)} style={{background:"#f1f5f9",borderRadius:"50%",width:28,height:28,fontSize:13,color:"#64748b"}}>✕</button>
            </div>
            <div className="fw"><label className="fl">Item Name *</label><input value={newExchange.itemName} onChange={e=>setNewExchange({...newExchange,itemName:e.target.value})} placeholder="e.g. Royal Canin Puppy Pack" style={iS}/></div>
            <div className="fw"><label className="fl">Item Type</label>
              <select value={newExchange.itemType} onChange={e=>setNewExchange({...newExchange,itemType:e.target.value})} style={iS}>
                {["Toy","Food/Treats","Accessories","Medicine (unopened)","Clothing","Cage/Carrier","Other"].map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div className="fw"><label className="fl">Reason for listing</label><input value={newExchange.reason} onChange={e=>setNewExchange({...newExchange,reason:e.target.value})} placeholder="e.g. My pet didn't take to it — barely used" style={iS}/></div>
            <div className="two-col">
              <div className="fw"><label className="fl">Your Flat *</label><input value={newExchange.flat} onChange={e=>setNewExchange({...newExchange,flat:e.target.value})} placeholder="e.g. A-201" style={iS}/></div>
              <div className="fw"><label className="fl">Contact No. *</label><input type="tel" value={newExchange.contact} onChange={e=>setNewExchange({...newExchange,contact:e.target.value})} placeholder="e.g. 9876543210" style={iS}/></div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button className="btn" onClick={()=>setShowAddExchange(false)} style={{flex:1,padding:"12px",borderRadius:12,background:"#f1f5f9",color:"#64748b",fontWeight:800}}>Cancel</button>
              <button className="btn" onClick={addExchangeItem} style={{flex:2,padding:"12px",borderRadius:12,background:"linear-gradient(135deg,#059669,#10b981)",color:"white",fontWeight:800}}>List Item</button>
            </div>
          </div>
        </div>
      )}

      {/* ADD VET/PRO */}
      {showAddVetPro&&(
        <div className="overlay" onClick={()=>setShowAddVetPro(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:800}}>Add a Professional 🏥</div>
              <button className="btn" onClick={()=>setShowAddVetPro(false)} style={{background:"#f1f5f9",borderRadius:"50%",width:28,height:28,fontSize:13,color:"#64748b"}}>✕</button>
            </div>
            <div className="fw"><label className="fl">Category</label>
              <select value={newVetPro.category} onChange={e=>setNewVetPro({...newVetPro,category:e.target.value})} style={iS}>
                {["Vet","Groomer","Walker","Trainer"].map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div className="fw"><label className="fl">Name *</label><input value={newVetPro.name} onChange={e=>setNewVetPro({...newVetPro,name:e.target.value})} placeholder="e.g. Happy Paws Clinic" style={iS}/></div>
            <div className="fw"><label className="fl">Specialty / Services</label><input value={newVetPro.specialty} onChange={e=>setNewVetPro({...newVetPro,specialty:e.target.value})} placeholder="e.g. Dogs & Cats" style={iS}/></div>
            <div className="fw"><label className="fl">Phone No. *</label><input type="tel" value={newVetPro.phone} onChange={e=>setNewVetPro({...newVetPro,phone:e.target.value})} placeholder="e.g. 9876543210" style={iS}/></div>
            <div className="two-col">
              <div className="fw"><label className="fl">Distance</label><input value={newVetPro.distance} onChange={e=>setNewVetPro({...newVetPro,distance:e.target.value})} placeholder="e.g. 1.2 km" style={iS}/></div>
              <div className="fw"><label className="fl">Hours</label><input value={newVetPro.hours} onChange={e=>setNewVetPro({...newVetPro,hours:e.target.value})} placeholder="e.g. 9am-6pm" style={iS}/></div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button className="btn" onClick={()=>setShowAddVetPro(false)} style={{flex:1,padding:"12px",borderRadius:12,background:"#f1f5f9",color:"#64748b",fontWeight:800}}>Cancel</button>
              <button className="btn" onClick={addVetPro} style={{flex:2,padding:"12px",borderRadius:12,background:"linear-gradient(135deg,#059669,#10b981)",color:"white",fontWeight:800}}>Add Professional</button>
            </div>
          </div>
        </div>
      )}

      {/* POST NOTICE */}
      {showAddNotice&&(
        <div className="overlay" onClick={()=>setShowAddNotice(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:800}}>Post a Notice 📌</div>
              <button className="btn" onClick={()=>setShowAddNotice(false)} style={{background:"#f1f5f9",borderRadius:"50%",width:28,height:28,fontSize:13,color:"#64748b"}}>✕</button>
            </div>
            <div className="fw">
              <label className="fl">Notice Type</label>
              <div style={{display:"flex",gap:10}}>
                <button className="btn" onClick={()=>setNewNotice(n=>({...n,important:false}))} style={{flex:1,padding:"9px",borderRadius:10,fontWeight:800,fontSize:12,background:!newNotice.important?"#f1f5f9":"#fafafa",color:!newNotice.important?"#334155":"#94a3b8",border:`2px solid ${!newNotice.important?"#94a3b8":"transparent"}`}}>📋 Regular</button>
                <button className="btn" onClick={()=>setNewNotice(n=>({...n,important:true}))} style={{flex:1,padding:"9px",borderRadius:10,fontWeight:800,fontSize:12,background:newNotice.important?"#fef3c7":"#fafafa",color:newNotice.important?"#92400e":"#94a3b8",border:`2px solid ${newNotice.important?"#f59e0b":"transparent"}`}}>📢 Important</button>
              </div>
            </div>
            <div className="fw"><label className="fl">Notice Title *</label><input value={newNotice.title} onChange={e=>setNewNotice(n=>({...n,title:e.target.value}))} placeholder="e.g. Dog Park Maintenance on Sunday" style={iS}/></div>
            <div className="fw"><label className="fl">Full Message *</label><textarea value={newNotice.body} onChange={e=>setNewNotice(n=>({...n,body:e.target.value}))} placeholder="Type the full message including dates, times, and details..." style={{...iS,minHeight:110,resize:"vertical"}}/></div>
            <div className="fw"><label className="fl">Posted By</label><input value={newNotice.author} onChange={e=>setNewNotice(n=>({...n,author:e.target.value}))} placeholder="e.g. Pet Group RR, Management Committee" style={iS}/></div>
            {(newNotice.title||newNotice.body)&&(
              <div style={{background:"#f8fafc",borderRadius:10,padding:"11px",marginBottom:12,border:"1px solid #e2e8f0"}}>
                <div style={{fontSize:11,fontWeight:800,color:"#94a3b8",marginBottom:6,textTransform:"uppercase"}}>Preview</div>
                <div style={{display:"flex",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                  {newNotice.important&&<span className="badge" style={{background:"#fef3c7",color:"#92400e"}}>📢 Important</span>}
                  <span style={{fontWeight:900,fontSize:13,color:"#1e293b"}}>{newNotice.title||"Title..."}</span>
                </div>
                <div style={{fontSize:12,color:"#334155",lineHeight:1.6}}>{newNotice.body||"Message..."}</div>
              </div>
            )}
            <div style={{display:"flex",gap:10}}>
              <button className="btn" onClick={()=>setShowAddNotice(false)} style={{flex:1,padding:"12px",borderRadius:12,background:"#f1f5f9",color:"#64748b",fontWeight:800}}>Cancel</button>
              <button className="btn" onClick={addNotice} style={{flex:2,padding:"12px",borderRadius:12,background:"linear-gradient(135deg,#1e3a5f,#2563eb)",color:"white",fontWeight:800}}>📌 Post Notice</button>
            </div>
          </div>
        </div>
      )}

      {/* DELETE NOTICE */}
      {showDeleteNotice&&(
        <div className="overlay" onClick={()=>setShowDeleteNotice(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:360,textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:8}}>🗑️</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:800,marginBottom:8}}>Delete This Notice?</div>
            <div style={{fontSize:13,color:"#64748b",marginBottom:20}}>This notice will be permanently removed from the board.</div>
            <div style={{display:"flex",gap:10}}>
              <button className="btn" onClick={()=>setShowDeleteNotice(null)} style={{flex:1,padding:"12px",borderRadius:12,background:"#f1f5f9",color:"#64748b",fontWeight:800}}>Cancel</button>
              <button className="btn" onClick={()=>deleteNotice(showDeleteNotice)} style={{flex:1,padding:"12px",borderRadius:12,background:"#dc2626",color:"white",fontWeight:800}}>Delete</button>
            </div>
          </div>
        </div>
      )}

      {/* ASK QUESTION — Change 7 */}
      {showAddQuestion&&(
        <div className="overlay" onClick={()=>setShowAddQuestion(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:800}}>Ask the Community 💬</div>
              <button className="btn" onClick={()=>setShowAddQuestion(false)} style={{background:"#f1f5f9",borderRadius:"50%",width:28,height:28,fontSize:13,color:"#64748b"}}>✕</button>
            </div>
            <div className="fw"><label className="fl">Your Question *</label><textarea value={newQuestion.question} onChange={e=>setNewQuestion({...newQuestion,question:e.target.value})} placeholder="e.g. Does anyone know a good pet groomer nearby?" style={{...iS,minHeight:90,resize:"vertical"}}/></div>
            <div className="fw"><label className="fl">Your Flat No. *</label><input value={newQuestion.askedBy} onChange={e=>setNewQuestion({...newQuestion,askedBy:e.target.value})} placeholder="e.g. A-201" style={iS}/></div>
            <div style={{display:"flex",gap:10}}>
              <button className="btn" onClick={()=>setShowAddQuestion(false)} style={{flex:1,padding:"12px",borderRadius:12,background:"#f1f5f9",color:"#64748b",fontWeight:800}}>Cancel</button>
              <button className="btn" onClick={addQuestion} style={{flex:2,padding:"12px",borderRadius:12,background:"linear-gradient(135deg,#4338ca,#6366f1)",color:"white",fontWeight:800}}>Post Question</button>
            </div>
          </div>
        </div>
      )}

      {/* REPLY TO QUESTION — Change 7 */}
      {showAddReply&&(
        <div className="overlay" onClick={()=>setShowAddReply(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:800}}>Post a Reply 💬</div>
              <button className="btn" onClick={()=>setShowAddReply(null)} style={{background:"#f1f5f9",borderRadius:"50%",width:28,height:28,fontSize:13,color:"#64748b"}}>✕</button>
            </div>
            <div style={{background:"#eef2ff",borderRadius:10,padding:"10px 12px",marginBottom:13,fontSize:12,color:"#4338ca",fontWeight:600}}>
              💬 Replying to: <em>"{community.find(q=>q.id===showAddReply)?.question?.slice(0,60)}{community.find(q=>q.id===showAddReply)?.question?.length>60?"...":""}"</em>
            </div>
            <div className="fw"><label className="fl">Your Reply *</label><textarea value={newReply.text} onChange={e=>setNewReply({...newReply,text:e.target.value})} placeholder="Share your answer or experience..." style={{...iS,minHeight:80,resize:"vertical"}}/></div>
            <div className="fw"><label className="fl">Your Flat No. *</label><input value={newReply.flat} onChange={e=>setNewReply({...newReply,flat:e.target.value})} placeholder="e.g. B-104" style={iS}/></div>
            <div style={{display:"flex",gap:10}}>
              <button className="btn" onClick={()=>setShowAddReply(null)} style={{flex:1,padding:"12px",borderRadius:12,background:"#f1f5f9",color:"#64748b",fontWeight:800}}>Cancel</button>
              <button className="btn" onClick={()=>addReplyFn(showAddReply)} style={{flex:2,padding:"12px",borderRadius:12,background:"linear-gradient(135deg,#4338ca,#6366f1)",color:"white",fontWeight:800}}>Post Reply</button>
            </div>
          </div>
        </div>
      )}

      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
